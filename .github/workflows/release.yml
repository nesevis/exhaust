name: Release

on:
  push:
    tags:
      - 'release-*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.3.12)'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode 26.2
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Work around Swift 6.2 prebuilt swift-syntax linker bug (SPM#9495)
        run: swift package edit swift-syntax

      - name: Run tests (source)
        run: |
          mkdir -p .build
          set +o pipefail
          swift test --no-parallel 2>&1 | tee .build/test-output-source.txt
          exit ${PIPESTATUS[0]}

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # Strip 'release-' prefix from tag name
            VERSION="${GITHUB_REF_NAME#release-}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "vtag=v$VERSION" >> "$GITHUB_OUTPUT"

          git fetch --tags --force
          NOTES=$(git tag -l --format='%(contents)' "$GITHUB_REF_NAME")
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Verify v-tag does not already exist
        env:
          VTAG: ${{ steps.version.outputs.vtag }}
        run: |
          if git rev-parse "refs/tags/$VTAG" >/dev/null 2>&1; then
            echo "::error::Tag $VTAG already exists. Delete it first or bump the version."
            exit 1
          fi

      - name: Build XCFramework
        run: bash Scripts/build-xcframework.sh

      - name: Clean debug artifacts
        run: swift package clean

      - name: Run tests (binary xcframework)
        env:
          EXHAUST_RELEASE: "1"
        run: |
          set +o pipefail
          swift test --no-parallel --skip ExhaustCoreTests 2>&1 | tee .build/test-output-xcframework.txt
          exit ${PIPESTATUS[0]}

      - name: Collect crash reports
        if: failure()
        run: |
          REPORT_DIR="$HOME/Library/Logs/DiagnosticReports"
          if [ -d "$REPORT_DIR" ]; then
            echo "### Crash reports" >> "$GITHUB_STEP_SUMMARY"
            for f in "$REPORT_DIR"/*.ips "$REPORT_DIR"/*.crash; do
              [ -f "$f" ] || continue
              echo "#### $(basename "$f")" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              head -80 "$f" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
            done
          fi

      - name: Test report
        if: always()
        run: |
          python3 - .build/test-output-source.txt .build/test-output-xcframework.txt <<'SCRIPT'
          import sys, os, re

          requested = sys.argv[1:]
          summary_path = os.environ.get('GITHUB_STEP_SUMMARY', '')

          if not summary_path:
              print("GITHUB_STEP_SUMMARY not set, skipping report")
              sys.exit(0)

          found = [p for p in requested if os.path.exists(p)]
          missing = [p for p in requested if not os.path.exists(p)]

          if missing:
              print(f"Missing test output files: {missing}")
          if not found:
              msg = f"No test output files found. Looked for: {requested}"
              print(msg)
              with open(summary_path, 'a') as f:
                  f.write(f"### Test report unavailable\n\n{msg}\n")
              sys.exit(0)

          failures = []
          total = '?'
          all_lines = []
          for path in found:
              with open(path) as f:
                  lines = f.readlines()
              all_lines.extend(lines)
              for line in lines:
                  m = re.search(r'Test "(.+?)" failed after .+ with (\d+) issue', line)
                  if m:
                      failures.append((m.group(1), int(m.group(2))))
              for line in reversed(lines):
                  m = re.search(r'Test run with (\d+) tests? in (\d+) suites? (passed|failed)', line)
                  if m:
                      total = m.group(1)
                      break

          errors = [l.rstrip() for l in all_lines if re.search(r'\berror:', l)]

          with open(summary_path, 'a') as f:
              if total == '?':
                  f.write("### Test report unavailable\n\nCould not find test summary line in output.\n")
                  if errors:
                      f.write(f"\n**Build errors ({len(errors)}):**\n```\n")
                      for line in errors:
                          f.write(line + '\n')
                      f.write("```\n")
                  f.write(f"\nLast 20 lines of output:\n```\n")
                  for line in all_lines[-20:]:
                      f.write(line)
                  f.write("```\n")
              elif not failures:
                  f.write(f"### All {total} tests passed\n")
              else:
                  f.write(f"### {len(failures)} of {total} tests failed\n\n")
                  f.write("| Test | Issues |\n|------|--------|\n")
                  for name, count in failures:
                      f.write(f"| {name} | {count} |\n")
          SCRIPT

      - name: Compute checksum
        id: checksum
        run: |
          CHECKSUM=$(swift package compute-checksum Frameworks/ExhaustCore.xcframework.zip)
          echo "checksum=$CHECKSUM" >> "$GITHUB_OUTPUT"

      - name: Update Package.swift and create release tag
        env:
          VTAG: ${{ steps.version.outputs.vtag }}
          CHECKSUM: ${{ steps.checksum.outputs.checksum }}
        run: |
          URL="https://github.com/nesevis/exhaust/releases/download/$VTAG/ExhaustCore.xcframework.zip"

          # Switch to precompiled mode
          sed -i '' \
            's|let usePrecompiled = ProcessInfo.processInfo.environment\["EXHAUST_RELEASE"\] != nil|let usePrecompiled = true|' \
            Package.swift

          # Point binary target at the release URL
          sed -i '' \
            "s|.binaryTarget(name: \"ExhaustCore\", path: \"Frameworks/ExhaustCore.xcframework\")|.binaryTarget(name: \"ExhaustCore\", url: \"$URL\", checksum: \"$CHECKSUM\")|" \
            Package.swift

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "release/$VTAG"
          git add Package.swift
          git commit -m "Update Package.swift with xcframework URL for $VTAG"
          git tag "$VTAG"
          git push origin "release/$VTAG"
          git push origin "$VTAG"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VTAG: ${{ steps.version.outputs.vtag }}
          NOTES: ${{ steps.version.outputs.notes }}
        run: |
          if [ -n "$NOTES" ]; then
            gh release create "$VTAG" \
              --title "$VTAG" \
              --notes "$NOTES" \
              "Frameworks/ExhaustCore.xcframework.zip#ExhaustCore.xcframework.zip"
          else
            gh release create "$VTAG" \
              --title "$VTAG" \
              --generate-notes \
              "Frameworks/ExhaustCore.xcframework.zip#ExhaustCore.xcframework.zip"
          fi
