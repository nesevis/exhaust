name: Release

on:
  push:
    tags:
      - 'release-*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.3.12)'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode 26.2
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Run tests (source)
        run: swift test --no-parallel --xunit-output .build/tests-source.xml

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # Strip 'release-' prefix from tag name
            VERSION="${GITHUB_REF_NAME#release-}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "vtag=v$VERSION" >> "$GITHUB_OUTPUT"

          git fetch --tags --force
          NOTES=$(git tag -l --format='%(contents)' "$GITHUB_REF_NAME")
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Verify v-tag does not already exist
        env:
          VTAG: ${{ steps.version.outputs.vtag }}
        run: |
          if git rev-parse "refs/tags/$VTAG" >/dev/null 2>&1; then
            echo "::error::Tag $VTAG already exists. Delete it first or bump the version."
            exit 1
          fi

      - name: Build XCFramework
        run: bash Scripts/build-xcframework.sh

      - name: Run tests (binary xcframework)
        env:
          EXHAUST_RELEASE: "1"
        run: swift test --no-parallel --skip ExhaustCoreTests --xunit-output .build/tests-xcframework.xml

      - name: Test report
        if: always()
        run: |
          python3 - .build/tests-source.xml .build/tests-xcframework.xml <<'SCRIPT'
          import xml.etree.ElementTree as ET, sys, os, glob
          paths = [p for a in sys.argv[1:] for p in glob.glob(a) if os.path.exists(p)]
          if not paths:
              sys.exit(0)
          total_tests = total_failures = 0
          failures = []
          for path in paths:
              tree = ET.parse(path)
              for suite in tree.iter('testsuite'):
                  total_tests += int(suite.get('tests', 0))
                  total_failures += int(suite.get('failures', 0))
              for case in tree.iter('testcase'):
                  for fail in case.iter('failure'):
                      msg = (fail.get('message') or fail.text or '').split('\n')[0]
                      failures.append((case.get('classname',''), case.get('name',''), msg))
          with open(os.environ.get('GITHUB_STEP_SUMMARY', '/dev/null'), 'a') as f:
              if total_failures == 0:
                  f.write(f"### All {total_tests} tests passed\n")
              else:
                  f.write(f"### {total_failures} of {total_tests} tests failed\n\n")
                  f.write("| Suite | Test | Message |\n|-------|------|---------|\n")
                  for suite, name, msg in failures:
                      f.write(f"| `{suite}` | `{name}` | {msg} |\n")
          SCRIPT

      - name: Compute checksum
        id: checksum
        run: |
          CHECKSUM=$(swift package compute-checksum Frameworks/ExhaustCore.xcframework.zip)
          echo "checksum=$CHECKSUM" >> "$GITHUB_OUTPUT"

      - name: Update Package.swift and create release tag
        env:
          VTAG: ${{ steps.version.outputs.vtag }}
          CHECKSUM: ${{ steps.checksum.outputs.checksum }}
        run: |
          URL="https://github.com/nesevis/exhaust/releases/download/$VTAG/ExhaustCore.xcframework.zip"

          # Switch to precompiled mode
          sed -i '' \
            's|let usePrecompiled = ProcessInfo.processInfo.environment\["EXHAUST_RELEASE"\] != nil|let usePrecompiled = true|' \
            Package.swift

          # Point binary target at the release URL
          sed -i '' \
            "s|.binaryTarget(name: \"ExhaustCore\", path: \"Frameworks/ExhaustCore.xcframework\")|.binaryTarget(name: \"ExhaustCore\", url: \"$URL\", checksum: \"$CHECKSUM\")|" \
            Package.swift

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "release/$VTAG"
          git add Package.swift
          git commit -m "Update Package.swift with xcframework URL for $VTAG"
          git tag "$VTAG"
          git push origin "release/$VTAG"
          git push origin "$VTAG"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VTAG: ${{ steps.version.outputs.vtag }}
          NOTES: ${{ steps.version.outputs.notes }}
        run: |
          if [ -n "$NOTES" ]; then
            gh release create "$VTAG" \
              --title "$VTAG" \
              --notes "$NOTES" \
              "Frameworks/ExhaustCore.xcframework.zip#ExhaustCore.xcframework.zip"
          else
            gh release create "$VTAG" \
              --title "$VTAG" \
              --generate-notes \
              "Frameworks/ExhaustCore.xcframework.zip#ExhaustCore.xcframework.zip"
          fi
