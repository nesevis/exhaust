name: Release

on:
  push:
    tags:
      - 'release-*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.3.12)'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode 26.2
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # Strip 'release-' prefix from tag name
            VERSION="${GITHUB_REF_NAME#release-}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "vtag=v$VERSION" >> "$GITHUB_OUTPUT"

          git fetch --tags --force
          NOTES=$(git tag -l --format='%(contents)' "$GITHUB_REF_NAME")
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Verify v-tag does not already exist
        env:
          VTAG: ${{ steps.version.outputs.vtag }}
        run: |
          if git rev-parse "refs/tags/$VTAG" >/dev/null 2>&1; then
            echo "::error::Tag $VTAG already exists. Delete it first or bump the version."
            exit 1
          fi

      - name: Build XCFramework
        run: bash Scripts/build-xcframework.sh

      - name: Compute checksum
        id: checksum
        run: |
          CHECKSUM=$(swift package compute-checksum Frameworks/ExhaustCore.xcframework.zip)
          echo "checksum=$CHECKSUM" >> "$GITHUB_OUTPUT"

      - name: Update Package.swift and create release tag
        env:
          VTAG: ${{ steps.version.outputs.vtag }}
          CHECKSUM: ${{ steps.checksum.outputs.checksum }}
        run: |
          URL="https://github.com/nesevis/exhaust/releases/download/$VTAG/ExhaustCore.xcframework.zip"

          # Switch to precompiled mode
          sed -i '' \
            's|let usePrecompiled = ProcessInfo.processInfo.environment\["EXHAUST_RELEASE"\] != nil|let usePrecompiled = true|' \
            Package.swift

          # Point binary target at the release URL
          sed -i '' \
            "s|.binaryTarget(name: \"ExhaustCore\", path: \"Frameworks/ExhaustCore.xcframework\")|.binaryTarget(name: \"ExhaustCore\", url: \"$URL\", checksum: \"$CHECKSUM\")|" \
            Package.swift

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "release/$VTAG"
          git add Package.swift
          git commit -m "Update Package.swift with xcframework URL for $VTAG"
          git tag "$VTAG"
          git push origin "release/$VTAG"
          git push origin "$VTAG"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VTAG: ${{ steps.version.outputs.vtag }}
          NOTES: ${{ steps.version.outputs.notes }}
        run: |
          if [ -n "$NOTES" ]; then
            gh release create "$VTAG" \
              --title "$VTAG" \
              --notes "$NOTES" \
              "Frameworks/ExhaustCore.xcframework.zip#ExhaustCore.xcframework.zip"
          else
            gh release create "$VTAG" \
              --title "$VTAG" \
              --generate-notes \
              "Frameworks/ExhaustCore.xcframework.zip#ExhaustCore.xcframework.zip"
          fi
