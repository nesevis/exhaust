name: Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode 26.5
        run: sudo xcode-select -s /Applications/Xcode_26.5.app/Contents/Developer

      - name: Build documentation
        run: |
          swift package \
            --allow-writing-to-directory docs-out \
            generate-documentation \
            --target Exhaust \
            --disable-indexing \
            --transform-for-static-hosting \
            --hosting-base-path exhaust \
            --output-path docs-out
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs-out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
