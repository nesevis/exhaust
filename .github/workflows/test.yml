name: Tests

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode 26.2
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Run tests
        run: swift test --no-parallel
