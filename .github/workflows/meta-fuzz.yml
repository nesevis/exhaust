name: Meta-Fuzz

on:
  push:
    branches: [main]
  schedule:
    # Nightly campaign, 04:00 AEST (18:00 UTC on the preceding calendar day).
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      budget:
        description: "Fuzz budget in seconds"
        required: false
        default: "900"

# Self-fuzzing lanes: Exhaust fuzzed with its own #explore(time:) mode, ExhaustCore
# instrumented whole-graph via -Xswiftc.
#
# Isolation invariant: coverage counters are process-global, so a fuzz search must have its test
# process to itself — any other test running in parallel adds spurious edges to attempt signatures
# and silently changes a seed-pinned run's trajectory. Two guards enforce this:
#   1. The replay job stays uninstrumented (no $COVERAGE_FLAGS) and never sets METAFUZZ_FUZZ, so
#      its unfiltered, parallel invocations contain no live counters and no fuzz search.
#   2. Any suite that runs a real fuzz search (FuzzEntryTests) runs only in an invocation filtered
#      down to that suite, or as a standalone probe executable.
# Do not add coverage flags to the replay job or lift the fuzz suite's env gate without
# restructuring accordingly.
env:
  COVERAGE_FLAGS: -Xswiftc -sanitize=undefined -Xswiftc -sanitize-coverage=edge,inline-8bit-counters,pc-table

jobs:
  # The hard gate: every frozen reproducer replays clean, plus the in-package oracle smoke
  # coverage. Deterministic, uninstrumented, minutes.
  replay:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode 26.5
        run: sudo xcode-select -s /Applications/Xcode_26.5.app/Contents/Developer

      - name: Replay frozen regressions
        run: swift test --package-path MetaFuzzHarness

      - name: Oracle smoke coverage
        run: swift test --filter MetaFuzzOracleTests

  # The fuzz lane. Push runs are short and seed-pinned; nightly and manual runs go through the
  # trap-resilient probe wrapper with a longer budget and unpinned seeds.
  fuzz:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode 26.5
        run: sudo xcode-select -s /Applications/Xcode_26.5.app/Contents/Developer

      - name: Short pinned fuzz (push)
        if: github.event_name == 'push'
        env:
          METAFUZZ_FUZZ: "1"
          METAFUZZ_BUDGET: "60"
          METAFUZZ_SEED: "1"
          METAFUZZ_FINDINGS: ${{ runner.temp }}/metafuzz-findings
          EXHAUST_RESUME: "0"
          EXHAUST_STATE_DIR: ${{ runner.temp }}/metafuzz-state
        run: |
          swift build --package-path MetaFuzzHarness --build-tests $COVERAGE_FLAGS
          bash Scripts/measure-memory.sh "${{ runner.temp }}/metafuzz-probe" -- \
            swift test --package-path MetaFuzzHarness --skip-build \
              --filter FuzzEntryTests $COVERAGE_FLAGS

      - name: Nightly fuzz campaign
        if: github.event_name != 'push'
        env:
          EXHAUST_STATE_DIR: ${{ runner.temp }}/metafuzz-state
        run: |
          swift build --package-path MetaFuzzHarness --configuration release --product MetaFuzzProbe $COVERAGE_FLAGS
          bash Scripts/measure-memory.sh "${{ runner.temp }}/metafuzz-probe" -- \
            bash MetaFuzzHarness/scripts/nightly-fuzz.sh \
              "$(swift build --package-path MetaFuzzHarness --configuration release --product MetaFuzzProbe $COVERAGE_FLAGS --show-bin-path)/MetaFuzzProbe" \
              --budget-seconds "${{ github.event.inputs.budget || '900' }}" \
              --findings-directory "${{ runner.temp }}/metafuzz-findings"

      - name: Probe metrics summary
        if: always()
        run: |
          PROBE_PREFIX="${{ runner.temp }}/metafuzz-probe"
          PROBE_OUTPUT="${PROBE_PREFIX}.log"
          MEMORY_METRICS="${PROBE_PREFIX}.metrics.env"
          echo "### Meta-fuzz probe metrics" >> "$GITHUB_STEP_SUMMARY"
          if [ -f "$PROBE_OUTPUT" ] && grep -q '^metafuzz: probe throughput ' "$PROBE_OUTPUT"; then
            grep '^metafuzz: probe throughput ' "$PROBE_OUTPUT" | tail -1 | sed 's/^metafuzz: /- /' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No probe completed, so throughput is unavailable." >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f "$MEMORY_METRICS" ]; then
            source "$MEMORY_METRICS"
            echo "- maximum resident set size ${max_rss_mib} MiB" >> "$GITHUB_STEP_SUMMARY"
            echo "- peak memory footprint ${peak_footprint_mib} MiB" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- memory metrics unavailable" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload probe metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: meta-fuzz-metrics
          path: |
            ${{ runner.temp }}/metafuzz-probe.log
            ${{ runner.temp }}/metafuzz-probe.time.txt
            ${{ runner.temp }}/metafuzz-probe.metrics.env
          if-no-files-found: warn
          retention-days: 30

      - name: Upload findings
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: metafuzz-findings
          path: |
            ${{ runner.temp }}/metafuzz-findings
            ${{ runner.temp }}/metafuzz-state
          if-no-files-found: ignore

      - name: Collect crash reports
        if: failure()
        run: |
          REPORT_DIR="$HOME/Library/Logs/DiagnosticReports"
          if [ -d "$REPORT_DIR" ]; then
            echo "### Crash reports" >> "$GITHUB_STEP_SUMMARY"
            for f in "$REPORT_DIR"/*.ips "$REPORT_DIR"/*.crash; do
              [ -f "$f" ] || continue
              echo "#### $(basename "$f")" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              head -80 "$f" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
            done
          fi

      - name: Findings summary
        if: failure()
        run: |
          FINDINGS_DIR="${{ runner.temp }}/metafuzz-findings"
          if [ -d "$FINDINGS_DIR" ] && [ -n "$(ls -A "$FINDINGS_DIR" 2>/dev/null)" ]; then
            echo "### Freeze candidates (commit to MetaFuzzHarness/Regressions/ with the fix)" >> "$GITHUB_STEP_SUMMARY"
            for f in "$FINDINGS_DIR"/*.json; do
              echo "#### $(basename "$f")" >> "$GITHUB_STEP_SUMMARY"
              echo '```json' >> "$GITHUB_STEP_SUMMARY"
              cat "$f" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
            done
          fi
